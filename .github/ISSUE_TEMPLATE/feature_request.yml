name: Feature request
description: Suggest an improvement to the repository, Codex setup, documentation, or contributor workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Clear use cases and constraints help keep the project focused.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What gap, friction, or missing capability are you trying to solve?
      placeholder: Describe the problem from a contributor or user perspective.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
      placeholder: Include workarounds, trade-offs, or why existing behavior is not enough.
  - type: dropdown
    id: impact
    attributes:
      label: Primary impact area
      options:
        - Skill authoring
        - Codex persona behavior
        - Installation or packaging
        - Documentation
        - Testing or validation
        - Repository/community workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, references, or prior discussions.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues before opening this request.
          required: true
        - label: This request is specific enough to discuss or implement.
          required: true
